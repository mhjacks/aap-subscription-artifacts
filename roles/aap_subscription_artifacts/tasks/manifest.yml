---
# RHSM API backend: discover/create/attach, then export via management API.

- name: Discover existing allocations
  ansible.builtin.include_tasks: discover_allocation.yml

- name: Ensure an allocation UUID exists
  ansible.builtin.include_tasks: ensure_allocation.yml

- name: Show allocation selection
  ansible.builtin.debug:
    msg: >-
      {{
        'Reusing existing AAP-entitled allocation "' ~ (__allocation_display_name | default(allocation_name))
        ~ '" (' ~ __allocation_uuid ~ '); skipping pool attach.'
        if (__reuse_existing_aap | default(false) | bool)
        else (
          'Using allocation "' ~ (__allocation_display_name | default(allocation_name))
          ~ '" (' ~ __allocation_uuid ~ ').'
        )
      }}

- name: Ensure AAP pool is attached when not already present
  when: not (__aap_already_attached | default(false) | bool)
  block:
    - name: Get allocation details including attached entitlements
      ansible.builtin.uri:
        url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}?include=entitlements"
        method: GET
        headers:
          Authorization: "Bearer {{ __rhsm_access_token }}"
        return_content: true
      register: __allocation_details
      no_log: true

    - name: Resolve AAP pool id
      ansible.builtin.include_tasks: resolve_aap_pool.yml

    - name: Collect attached entitlement pool ids
      vars:
        __ents: >-
          {{
            __allocation_details.json.body.entitlementsAttached.value
            | default(__allocation_details.json.body.entitlementsAttached, true)
            | default(__allocation_details.json.body.entitlements, true)
            | default([], true)
          }}
      ansible.builtin.set_fact:
        __attached_pool_ids: >-
          {{
            (__ents | map(attribute='poolId') | list)
            + (__ents | map(attribute='pool') | list)
            + (__ents | map(attribute='id') | list)
          }}

    - name: Attach AAP pool to allocation when missing
      when: __aap_pool_id not in __attached_pool_ids
      ansible.builtin.uri:
        url: >-
          {{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}/entitlements?pool={{ __aap_pool_id | urlencode }}&quantity={{ aap_pool_quantity }}
        method: POST
        headers:
          Authorization: "Bearer {{ __rhsm_access_token }}"
        status_code: [200, 201]
        return_content: true
      register: __attach_entitlement
      no_log: true

    - name: Note when AAP pool already attached on selected allocation
      when: __aap_pool_id in __attached_pool_ids
      ansible.builtin.debug:
        msg: "Pool {{ __aap_pool_id }} already attached to allocation {{ __allocation_uuid }}"

- name: Trigger manifest export
  ansible.builtin.uri:
    url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}/export"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
  register: __export_trigger
  no_log: true

- name: Resolve export job identifiers
  ansible.builtin.set_fact:
    __export_job_href: "{{ __export_trigger.json.body.href | default('') }}"
    __export_job_id: >-
      {{
        __export_trigger.json.body.exportJobID
        | default(__export_trigger.json.body.exportJobId)
        | default(__export_trigger.json.body.id)
        | default('')
      }}

- name: Poll export job via href when provided
  when: __export_job_href | length > 0
  ansible.builtin.uri:
    url: "{{ __export_job_href }}"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
    status_code: [200, 202]
  register: __export_job
  until: >
    (__export_job.status == 200)
    and (
      (__export_job.json.body.href | default('') | length > 0)
      or (__export_job.json.body.exportID | default('') | length > 0)
      or (__export_job.json.body.exportId | default('') | length > 0)
    )
  retries: "{{ export_retries }}"
  delay: "{{ export_delay }}"
  no_log: true

- name: Poll export job via job id when href missing
  when:
    - __export_job_href | length == 0
    - __export_job_id | length > 0
  ansible.builtin.uri:
    url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}/exportJob/{{ __export_job_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
    status_code: [200, 202]
  register: __export_job
  until: >
    (__export_job.status == 200)
    and (
      (__export_job.json.body.href | default('') | length > 0)
      or (__export_job.json.body.exportID | default('') | length > 0)
      or (__export_job.json.body.exportId | default('') | length > 0)
    )
  retries: "{{ export_retries }}"
  delay: "{{ export_delay }}"
  no_log: true

- name: Resolve download URL for completed export
  ansible.builtin.set_fact:
    __export_download_url: >-
      {{
        __export_job.json.body.href
        if (__export_job.json.body.href | default('') | length > 0)
        else (
          rhsm_api_base ~ '/allocations/' ~ __allocation_uuid ~ '/export/'
          ~ (
              __export_job.json.body.exportID
              | default(__export_job.json.body.exportId)
            )
        )
      }}

- name: Download subscription manifest zip
  ansible.builtin.get_url:
    url: "{{ __export_download_url }}"
    dest: "{{ __aap_artifacts_dir }}/{{ manifest_filename }}"
    mode: "0600"
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    force: true
  no_log: true
