---
# Prefer an existing allocation that already has an AAP subscription attached.
# Only create/attach when none is found.

- name: List subscription allocations
  ansible.builtin.uri:
    url: "{{ rhsm_api_base }}/allocations?limit=100"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
  register: __allocations_list
  no_log: true

- name: Probe allocations for attached entitlements
  when:
    - reuse_existing_aap_allocation | bool
    - (__allocations_list.json.body | default([]) | length) > 0
  ansible.builtin.uri:
    url: "{{ rhsm_api_base }}/allocations/{{ item.uuid }}?include=entitlements"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
  loop: "{{ __allocations_list.json.body | default([]) }}"
  loop_control:
    label: "{{ item.name | default(item.uuid) }}"
  register: __allocation_probes
  no_log: true

- name: Initialize AAP-entitled allocation candidates
  ansible.builtin.set_fact:
    __aap_entitled_allocations: []
    __reuse_existing_aap: false
    __aap_already_attached: false

- name: Collect allocations that already have an AAP subscription
  when:
    - reuse_existing_aap_allocation | bool
    - __allocation_probes is defined
    - __allocation_probes.results is defined
  block:
    - name: Add AAP-entitled allocation candidates
      vars:
        __ents: >-
          {{
            item.json.body.entitlementsAttached.value
            | default(item.json.body.entitlementsAttached, true)
            | default(item.json.body.entitlements, true)
            | default([], true)
          }}
        __name_matches: >-
          {{
            __ents
            | selectattr('productName', 'defined')
            | selectattr('productName', 'match', aap_pool_name_regex)
            | list
            + (
              __ents
              | selectattr('name', 'defined')
              | selectattr('name', 'match', aap_pool_name_regex)
              | list
            )
            + (
              __ents
              | selectattr('poolName', 'defined')
              | selectattr('poolName', 'match', aap_pool_name_regex)
              | list
            )
          }}
        __pool_id_matches: >-
          {{
            (
              __ents
              | selectattr('poolId', 'defined')
              | selectattr('poolId', 'equalto', aap_pool_id)
              | list
            )
            if (aap_pool_id | length > 0)
            else []
          }}
      ansible.builtin.set_fact:
        __aap_entitled_allocations: "{{ __aap_entitled_allocations + [item.json.body] }}"
      loop: "{{ __allocation_probes.results }}"
      loop_control:
        label: "{{ item.json.body.name | default(item.item.uuid | default('unknown')) }}"
      when:
        - item is not skipped
        - item is not failed
        - item.json is defined
        - item.json.body is defined
        - (__name_matches | length > 0) or (__pool_id_matches | length > 0)

- name: Prefer named allocation among AAP-entitled candidates
  when: __aap_entitled_allocations | length > 0
  ansible.builtin.set_fact:
    __selected_allocation: >-
      {{
        (
          __aap_entitled_allocations
          | selectattr('name', 'defined')
          | selectattr('name', 'equalto', allocation_name)
          | list
          | first
        )
        | default(__aap_entitled_allocations | first, true)
      }}
    __reuse_existing_aap: true
    __aap_already_attached: true

- name: Fall back to allocation with matching name (may need attach)
  when:
    - not (__reuse_existing_aap | bool)
  ansible.builtin.set_fact:
    __selected_allocation: >-
      {{
        (__allocations_list.json.body | default([]))
        | selectattr('name', 'defined')
        | selectattr('name', 'equalto', allocation_name)
        | list
        | first
        | default({}, true)
      }}

- name: Create subscription allocation when none selected
  when:
    - not (__reuse_existing_aap | bool)
    - __selected_allocation.uuid is not defined
  block:
    - name: List available Satellite versions
      when: allocation_version | length == 0
      ansible.builtin.uri:
        url: "{{ rhsm_api_base }}/allocations/versions"
        method: GET
        headers:
          Authorization: "Bearer {{ __rhsm_access_token }}"
        return_content: true
      register: __allocation_versions
      no_log: true

    - name: Pick latest Satellite version when unset
      when: allocation_version | length == 0
      vars:
        __version_body: "{{ __allocation_versions.json.body | default([]) }}"
      ansible.builtin.set_fact:
        __allocation_version: >-
          {{
            (
              __version_body
              | map(attribute='value')
              | list
              if (__version_body | length > 0 and __version_body[0] is mapping)
              else (__version_body | list)
            )
            | sort
            | last
            | default('sat-6.16', true)
          }}

    - name: Use configured allocation version
      when: allocation_version | length > 0
      ansible.builtin.set_fact:
        __allocation_version: "{{ allocation_version }}"

    - name: Create subscription allocation
      ansible.builtin.uri:
        url: "{{ rhsm_api_base }}/allocations?Name={{ allocation_name | urlencode }}&version={{ __allocation_version | urlencode }}"
        method: POST
        headers:
          Authorization: "Bearer {{ __rhsm_access_token }}"
        status_code: [200, 201]
        return_content: true
      register: __allocation_create
      no_log: true

    - name: Set selected allocation from create response
      ansible.builtin.set_fact:
        __selected_allocation:
          uuid: >-
            {{
              __allocation_create.json.body.uuid
              | default(__allocation_create.json.uuid)
              | default(__allocation_create.json.body.id)
            }}
          name: "{{ allocation_name }}"

- name: Set allocation UUID
  ansible.builtin.set_fact:
    __allocation_uuid: "{{ __selected_allocation.uuid }}"
    __allocation_display_name: "{{ __selected_allocation.name | default(allocation_name) }}"

- name: Assert allocation UUID is set
  ansible.builtin.assert:
    that:
      - __allocation_uuid is defined
      - __allocation_uuid | length > 0
    fail_msg: Failed to resolve subscription allocation UUID.

- name: Show allocation selection
  ansible.builtin.debug:
    msg: >-
      {{
        'Reusing existing AAP-entitled allocation "' ~ __allocation_display_name
        ~ '" (' ~ __allocation_uuid ~ '); skipping pool attach.'
        if (__reuse_existing_aap | bool)
        else (
          'Using allocation "' ~ __allocation_display_name
          ~ '" (' ~ __allocation_uuid ~ ').'
        )
      }}

- name: Ensure AAP pool is attached when not already present
  when: not (__aap_already_attached | bool)
  block:
    - name: Get allocation details including attached entitlements
      ansible.builtin.uri:
        url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}?include=entitlements"
        method: GET
        headers:
          Authorization: "Bearer {{ __rhsm_access_token }}"
        return_content: true
      register: __allocation_details
      no_log: true

    - name: List pools available for allocation
      ansible.builtin.uri:
        url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}/pools?limit=100"
        method: GET
        headers:
          Authorization: "Bearer {{ __rhsm_access_token }}"
        return_content: true
      register: __allocation_pools
      no_log: true

    - name: Use explicit AAP pool id when provided
      when: aap_pool_id | length > 0
      ansible.builtin.set_fact:
        __aap_pool_id: "{{ aap_pool_id }}"

    - name: Match AAP pools by productName or name
      when: aap_pool_id | length == 0
      vars:
        __pools: "{{ __allocation_pools.json.body | default([]) }}"
      ansible.builtin.set_fact:
        __matched_pools: >-
          {{
            __pools
            | selectattr('productName', 'defined')
            | selectattr('productName', 'match', aap_pool_name_regex)
            | list
            + (
              __pools
              | selectattr('name', 'defined')
              | selectattr('name', 'match', aap_pool_name_regex)
              | list
            )
          }}

    - name: Resolve AAP pool id from matched pools
      when: aap_pool_id | length == 0
      ansible.builtin.set_fact:
        __aap_pool_id: >-
          {{
            (__matched_pools | first).id
            | default((__matched_pools | first).poolId, true)
            | default('', true)
            if (__matched_pools | length > 0)
            else ''
          }}

    - name: Assert AAP pool was found
      ansible.builtin.assert:
        that:
          - __aap_pool_id | length > 0
        fail_msg: >-
          No AAP subscription pool matched. Set aap_pool_id explicitly, or adjust
          aap_pool_name_regex (current: {{ aap_pool_name_regex }}).
          Available product names:
          {{ (__allocation_pools.json.body | default([])) | map(attribute='productName') | list }}

    - name: Collect attached entitlement pool ids
      vars:
        __ents: >-
          {{
            __allocation_details.json.body.entitlementsAttached.value
            | default(__allocation_details.json.body.entitlementsAttached, true)
            | default(__allocation_details.json.body.entitlements, true)
            | default([], true)
          }}
      ansible.builtin.set_fact:
        __attached_pool_ids: >-
          {{
            (__ents | map(attribute='poolId') | list)
            + (__ents | map(attribute='pool') | list)
            + (__ents | map(attribute='id') | list)
          }}

    - name: Attach AAP pool to allocation when missing
      when: __aap_pool_id not in __attached_pool_ids
      ansible.builtin.uri:
        url: >-
          {{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}/entitlements?pool={{ __aap_pool_id | urlencode }}&quantity={{ aap_pool_quantity }}
        method: POST
        headers:
          Authorization: "Bearer {{ __rhsm_access_token }}"
        status_code: [200, 201]
        return_content: true
      register: __attach_entitlement
      no_log: true

    - name: Note when AAP pool already attached on selected allocation
      when: __aap_pool_id in __attached_pool_ids
      ansible.builtin.debug:
        msg: "Pool {{ __aap_pool_id }} already attached to allocation {{ __allocation_uuid }}"

- name: Trigger manifest export
  ansible.builtin.uri:
    url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}/export"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
  register: __export_trigger
  no_log: true

- name: Resolve export job identifiers
  ansible.builtin.set_fact:
    __export_job_href: "{{ __export_trigger.json.body.href | default('') }}"
    __export_job_id: >-
      {{
        __export_trigger.json.body.exportJobID
        | default(__export_trigger.json.body.exportJobId)
        | default(__export_trigger.json.body.id)
        | default('')
      }}

- name: Poll export job via href when provided
  when: __export_job_href | length > 0
  ansible.builtin.uri:
    url: "{{ __export_job_href }}"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
    status_code: [200, 202]
  register: __export_job
  until: >
    (__export_job.status == 200)
    and (
      (__export_job.json.body.href | default('') | length > 0)
      or (__export_job.json.body.exportID | default('') | length > 0)
      or (__export_job.json.body.exportId | default('') | length > 0)
    )
  retries: "{{ export_retries }}"
  delay: "{{ export_delay }}"
  no_log: true

- name: Poll export job via job id when href missing
  when:
    - __export_job_href | length == 0
    - __export_job_id | length > 0
  ansible.builtin.uri:
    url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}/exportJob/{{ __export_job_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
    status_code: [200, 202]
  register: __export_job
  until: >
    (__export_job.status == 200)
    and (
      (__export_job.json.body.href | default('') | length > 0)
      or (__export_job.json.body.exportID | default('') | length > 0)
      or (__export_job.json.body.exportId | default('') | length > 0)
    )
  retries: "{{ export_retries }}"
  delay: "{{ export_delay }}"
  no_log: true

- name: Resolve download URL for completed export
  ansible.builtin.set_fact:
    __export_download_url: >-
      {{
        __export_job.json.body.href
        if (__export_job.json.body.href | default('') | length > 0)
        else (
          rhsm_api_base ~ '/allocations/' ~ __allocation_uuid ~ '/export/'
          ~ (
              __export_job.json.body.exportID
              | default(__export_job.json.body.exportId)
            )
        )
      }}

- name: Download subscription manifest zip
  ansible.builtin.get_url:
    url: "{{ __export_download_url }}"
    dest: "{{ __aap_artifacts_dir }}/{{ manifest_filename }}"
    mode: "0600"
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    force: true
  no_log: true
