---
# RHSM API backend: discover or create an SCA allocation, then export.

- name: Discover existing allocations
  ansible.builtin.include_tasks: discover_allocation.yml

- name: Ensure an allocation UUID exists
  ansible.builtin.include_tasks: ensure_allocation.yml

- name: Show allocation selection
  ansible.builtin.debug:
    msg: >-
      Using SCA allocation "{{ __allocation_display_name | default(allocation_name) }}"
      ({{ __allocation_uuid }}) for manifest export.

- name: Trigger manifest export
  ansible.builtin.uri:
    url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}/export"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
  register: __export_trigger
  no_log: true

- name: Resolve export job identifiers
  ansible.builtin.set_fact:
    __export_job_href: "{{ __export_trigger.json.body.href | default('') }}"
    __export_job_id: >-
      {{
        __export_trigger.json.body.exportJobID
        | default(__export_trigger.json.body.exportJobId)
        | default(__export_trigger.json.body.id)
        | default('')
      }}

- name: Poll export job via href when provided
  when: __export_job_href | length > 0
  ansible.builtin.uri:
    url: "{{ __export_job_href }}"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
    status_code: [200, 202]
  register: __export_job
  until: >
    (__export_job.status == 200)
    and (
      (__export_job.json.body.href | default('') | length > 0)
      or (__export_job.json.body.exportID | default('') | length > 0)
      or (__export_job.json.body.exportId | default('') | length > 0)
    )
  retries: "{{ export_retries }}"
  delay: "{{ export_delay }}"
  no_log: true

- name: Poll export job via job id when href missing
  when:
    - __export_job_href | length == 0
    - __export_job_id | length > 0
  ansible.builtin.uri:
    url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}/exportJob/{{ __export_job_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
    status_code: [200, 202]
  register: __export_job
  until: >
    (__export_job.status == 200)
    and (
      (__export_job.json.body.href | default('') | length > 0)
      or (__export_job.json.body.exportID | default('') | length > 0)
      or (__export_job.json.body.exportId | default('') | length > 0)
    )
  retries: "{{ export_retries }}"
  delay: "{{ export_delay }}"
  no_log: true

- name: Resolve download URL for completed export
  ansible.builtin.set_fact:
    __export_download_url: >-
      {{
        __export_job.json.body.href
        if (__export_job.json.body.href | default('') | length > 0)
        else (
          rhsm_api_base ~ '/allocations/' ~ __allocation_uuid ~ '/export/'
          ~ (
              __export_job.json.body.exportID
              | default(__export_job.json.body.exportId)
            )
        )
      }}

- name: Download subscription manifest zip
  ansible.builtin.get_url:
    url: "{{ __export_download_url }}"
    dest: "{{ __aap_artifacts_dir }}/{{ manifest_filename }}"
    mode: "0600"
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    force: true
  no_log: true
