---
# Download via theforeman.foreman.redhat_manifest.
# Discovers/creates the allocation and AAP pool via RHSM so aap_pool_id is optional.

- name: Assert Red Hat portal credentials for foreman backend
  ansible.builtin.assert:
    that:
      - rh_username is defined
      - rh_username | length > 0
      - rh_password is defined
      - rh_password | length > 0
    fail_msg: >-
      manifest_backend=foreman requires rh_username and rh_password
      (theforeman.foreman.redhat_manifest authenticates to the Customer Portal).

- name: Assert RHSM access token for allocation/pool discovery
  ansible.builtin.assert:
    that:
      - __rhsm_access_token is defined
      - __rhsm_access_token | length > 0
    fail_msg: >-
      manifest_backend=foreman needs a working RHSM offline token so it can
      discover or create the allocation and locate the AAP pool automatically.

- name: Discover existing allocations via RHSM
  ansible.builtin.include_tasks: discover_allocation.yml

- name: Ensure an allocation UUID exists
  ansible.builtin.include_tasks: ensure_allocation.yml

- name: Show allocation selection
  ansible.builtin.debug:
    msg: >-
      {{
        'Reusing existing AAP-entitled allocation "' ~ (__allocation_display_name | default(allocation_name))
        ~ '" (' ~ __allocation_uuid ~ ').'
        if (__reuse_existing_aap | default(false) | bool)
        else (
          'Using allocation "' ~ (__allocation_display_name | default(allocation_name))
          ~ '" (' ~ __allocation_uuid ~ '); will attach AAP pool if needed.'
        )
      }}

- name: Download existing AAP-entitled manifest via theforeman.foreman
  when: __aap_already_attached | default(false) | bool
  theforeman.foreman.redhat_manifest:
    uuid: "{{ __allocation_uuid }}"
    username: "{{ rh_username }}"
    password: "{{ rh_password }}"
    path: "{{ __aap_artifacts_dir }}/{{ manifest_filename }}"
    content_access_mode: org_environment
    validate_certs: true
  no_log: true

- name: Resolve AAP pool and export via theforeman.foreman
  when: not (__aap_already_attached | default(false) | bool)
  block:
    - name: Resolve AAP pool id
      ansible.builtin.include_tasks: resolve_aap_pool.yml

    - name: Attach AAP pool and download manifest via theforeman.foreman
      theforeman.foreman.redhat_manifest:
        uuid: "{{ __allocation_uuid }}"
        username: "{{ rh_username }}"
        password: "{{ rh_password }}"
        pool_id: "{{ __aap_pool_id }}"
        quantity: "{{ aap_pool_quantity }}"
        path: "{{ __aap_artifacts_dir }}/{{ manifest_filename }}"
        content_access_mode: org_environment
        validate_certs: true
      no_log: true

- name: Note foreman download complete
  ansible.builtin.debug:
    msg: >-
      Wrote manifest via theforeman.foreman.redhat_manifest to
      {{ __aap_artifacts_dir }}/{{ manifest_filename }}
      (uuid {{ __allocation_uuid }}).
