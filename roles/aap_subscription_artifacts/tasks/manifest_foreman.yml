---
# Download via theforeman.foreman.redhat_manifest (SCA / org_environment).
# Discover or create allocation via RHSM, then export — no pool attach.

- name: Assert Red Hat portal credentials for foreman backend
  ansible.builtin.assert:
    that:
      - rh_username is defined
      - rh_username | length > 0
      - rh_password is defined
      - rh_password | length > 0
    fail_msg: >-
      manifest_backend=foreman requires rh_username and rh_password
      (theforeman.foreman.redhat_manifest authenticates to the Customer Portal).

- name: Assert RHSM access token for allocation discovery
  ansible.builtin.assert:
    that:
      - __rhsm_access_token is defined
      - __rhsm_access_token | length > 0
    fail_msg: >-
      manifest_backend=foreman needs a working RHSM offline token so it can
      discover existing allocations to download.

- name: Discover existing allocations via RHSM
  ansible.builtin.include_tasks: discover_allocation.yml

- name: Ensure an allocation UUID exists
  ansible.builtin.include_tasks: ensure_allocation.yml

- name: Show allocation selection
  ansible.builtin.debug:
    msg: >-
      Downloading SCA manifest for allocation
      "{{ __allocation_display_name | default(allocation_name) }}"
      ({{ __allocation_uuid }}).

- name: Download allocation manifest via theforeman.foreman
  theforeman.foreman.redhat_manifest:
    uuid: "{{ __allocation_uuid }}"
    username: "{{ rh_username }}"
    password: "{{ rh_password }}"
    path: "{{ __aap_artifacts_dir }}/{{ manifest_filename }}"
    content_access_mode: org_environment
    validate_certs: "{{ foreman_validate_certs }}"
  no_log: true

- name: Note foreman download complete
  ansible.builtin.debug:
    msg: >-
      Wrote manifest via theforeman.foreman.redhat_manifest to
      {{ __aap_artifacts_dir }}/{{ manifest_filename }}
      (uuid {{ __allocation_uuid }}).
