---
# Ensure __allocation_uuid is set. Creates when create_allocation_if_missing.
# Create uses the Customer Portal consumers API with a modern Satellite
# version — theforeman.foreman.redhat_manifest hardcodes sat-6.3.
# Empty/outdated named allocations can be replaced when portal creds exist.

- name: Resolve Satellite version for create/replace
  when: >
    (
      ((__allocation_uuid is not defined) or (__allocation_uuid | length == 0))
      and (create_allocation_if_missing | bool)
    )
    or (
      (__allocation_uuid is defined)
      and (__allocation_uuid | length > 0)
      and (replace_empty_named_allocation | bool)
      and (__selected_allocation.entitlementsAttachedQuantity | default(0) | int) == 0
      and (__aap_entitled_allocations | default([]) | length) == 0
      and ((__selected_allocation.version | default('99') | string) is version(replace_empty_max_version, '<='))
    )
  ansible.builtin.include_tasks: resolve_version.yml

- name: Replace empty named allocation so it can be recreated modern
  when:
    - replace_empty_named_allocation | bool
    - __allocation_uuid is defined
    - __allocation_uuid | length > 0
    - (__selected_allocation.name | default('')) == allocation_name
    - (__selected_allocation.entitlementsAttachedQuantity | default(0) | int) == 0
    - (__aap_entitled_allocations | default([]) | length) == 0
    - >
      (__selected_allocation.version | default('99') | string) is version(replace_empty_max_version, '<=')
  block:
    - name: Remember version of empty allocation before delete
      ansible.builtin.set_fact:
        __replaced_allocation_version: "{{ __selected_allocation.version | default('unknown') }}"

    - name: Delete empty allocation via RHSM API
      ansible.builtin.uri:
        url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}?force=true"
        method: DELETE
        headers:
          Authorization: "Bearer {{ __rhsm_access_token }}"
        status_code: [200, 204, 404]
      register: __allocation_delete
      failed_when: false
      no_log: true

    - name: Clear allocation UUID after delete
      when: (__allocation_delete.status | default(0)) in [200, 204, 404]
      ansible.builtin.set_fact:
        __allocation_uuid: ""
        __selected_allocation: {}

    - name: Note allocation replace
      ansible.builtin.debug:
        msg: >-
          Removed empty allocation "{{ allocation_name }}"
          (was Satellite {{ __replaced_allocation_version }}, 0 entitlements)
          so it can be recreated at {{ __allocation_version | default('latest') }}.

- name: Create subscription allocation when missing and allowed
  when:
    - (__allocation_uuid is not defined) or (__allocation_uuid | length == 0)
    - create_allocation_if_missing | bool
  block:
    - name: Create SCA allocation via Customer Portal API
      when:
        - rh_username is defined
        - rh_username | length > 0
        - rh_password is defined
        - rh_password | length > 0
      block:
        - name: Ensure Satellite version is resolved
          when: __allocation_version is not defined
          ansible.builtin.include_tasks: resolve_version.yml

        - name: Create named SCA allocation on the Customer Portal
          ansible.builtin.uri:
            url: "{{ portal_api_base }}/subscription/consumers"
            method: POST
            url_username: "{{ rh_username }}"
            url_password: "{{ rh_password }}"
            force_basic_auth: true
            validate_certs: "{{ foreman_validate_certs }}"
            body_format: json
            headers:
              Content-Type: application/json
              Accept: application/json
            body:
              name: "{{ allocation_name }}"
              type: satellite
              contentAccessMode: org_environment
              facts:
                distributor_version: "{{ __allocation_version }}"
                system.certificate_version: "3.2"
            status_code: [200, 201]
            return_content: true
          register: __portal_allocation_create
          no_log: true

        - name: Set allocation UUID from portal create
          ansible.builtin.set_fact:
            __allocation_uuid: "{{ __portal_allocation_create.json.uuid }}"
            __allocation_display_name: "{{ allocation_name }}"
            __allocation_created: true
            __aap_already_attached: false

        - name: Assert portal create returned a UUID
          ansible.builtin.assert:
            that:
              - __allocation_uuid is defined
              - __allocation_uuid | length > 0
            fail_msg: >-
              Customer Portal created allocation "{{ allocation_name }}"
              but did not return a uuid.

        - name: Show created allocation
          ansible.builtin.debug:
            msg: >-
              Created allocation name={{ allocation_name }}
              uuid={{ __allocation_uuid }} — will attach AAP and download.

    - name: Create allocation via RHSM management API when portal credentials are absent
      when: (__allocation_uuid is not defined) or (__allocation_uuid | length == 0)
      block:
        - name: Ensure Satellite version is resolved
          when: __allocation_version is not defined
          ansible.builtin.include_tasks: resolve_version.yml

        - name: Create subscription allocation via RHSM API
          ansible.builtin.uri:
            url: "{{ rhsm_api_base }}/allocations?Name={{ allocation_name | urlencode }}&version={{ __allocation_version | urlencode }}"
            method: POST
            headers:
              Authorization: "Bearer {{ __rhsm_access_token }}"
            status_code: [200, 201, 403, 400]
            return_content: true
          register: __allocation_create
          no_log: true
          failed_when: false

        - name: Fail helpfully when RHSM API create is forbidden
          when: (__allocation_create.status | default(0)) == 403
          ansible.builtin.fail:
            msg: >-
              RHSM management API refused to create allocation "{{ allocation_name }}"
              (HTTP 403). Re-run with -e rh_username=... -e rh_password=...
              Existing allocations: {{ __allocation_choices | default([]) }}

        - name: Fail when RHSM API create did not succeed
          when: (__allocation_create.status | default(0)) not in [200, 201]
          ansible.builtin.fail:
            msg: >-
              RHSM API create for "{{ allocation_name }}" failed with HTTP
              {{ __allocation_create.status | default('unknown') }}.
              Existing: {{ __allocation_choices | default([]) }}

        - name: Set allocation UUID from RHSM create response
          ansible.builtin.set_fact:
            __allocation_uuid: >-
              {{
                __allocation_create.json.body.uuid
                | default(__allocation_create.json.uuid)
                | default(__allocation_create.json.body.id)
              }}
            __allocation_display_name: "{{ allocation_name }}"
            __allocation_created: true
            __aap_already_attached: false

        - name: Show created allocation
          ansible.builtin.debug:
            msg: >-
              Created allocation name={{ allocation_name }}
              uuid={{ __allocation_uuid }} — will attach AAP and download.

- name: Assert allocation UUID is set
  ansible.builtin.assert:
    that:
      - __allocation_uuid is defined
      - __allocation_uuid | length > 0
    fail_msg: >-
      No subscription allocation selected for download.
      Set allocation_name or allocation_uuid, or provide rh_username/rh_password
      to create "{{ allocation_name }}".
      Available allocations: {{ __allocation_choices | default([]) }}
