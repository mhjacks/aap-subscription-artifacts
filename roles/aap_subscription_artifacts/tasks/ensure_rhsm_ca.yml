---
# theforeman.foreman.redhat_manifest hardcodes REDHAT_UEP=/etc/rhsm/ca/redhat-uep.pem
# (see upstream redhat_manifest.py). That file is not in public CA bundles; it ships
# in subscription-manager-rhsm-certificates on RHEL, but we always fetch a public
# copy so non-RHEL hosts work without that package.

- name: Check for Red Hat Entitlement Platform CA
  ansible.builtin.stat:
    path: "{{ rhsm_uep_ca_path }}"
  register: __rhsm_uep_ca

- name: Fetch Red Hat Entitlement Platform CA when missing
  when: not __rhsm_uep_ca.stat.exists
  block:
    - name: Download redhat-uep.pem to artifacts directory
      ansible.builtin.get_url:
        url: "{{ rhsm_uep_ca_url }}"
        dest: "{{ __aap_artifacts_dir }}/redhat-uep.pem"
        mode: "0644"
        force: false

    - name: Ensure RHSM CA directory exists
      ansible.builtin.file:
        path: "{{ rhsm_uep_ca_path | dirname }}"
        state: directory
        mode: "0755"
      become: true

    - name: Install redhat-uep.pem where theforeman.foreman expects it
      ansible.builtin.copy:
        src: "{{ __aap_artifacts_dir }}/redhat-uep.pem"
        dest: "{{ rhsm_uep_ca_path }}"
        mode: "0644"
        remote_src: true
      become: true

    - name: Re-check Red Hat Entitlement Platform CA
      ansible.builtin.stat:
        path: "{{ rhsm_uep_ca_path }}"
      register: __rhsm_uep_ca

- name: Assert Red Hat Entitlement Platform CA is available
  when: not (foreman_validate_certs | bool) or (__rhsm_uep_ca.stat.exists | bool)
  ansible.builtin.debug:
    msg: >-
      {{
        'Using ' ~ rhsm_uep_ca_path ~ ' for theforeman portal TLS.'
        if __rhsm_uep_ca.stat.exists
        else 'foreman_validate_certs=false; skipping RHSM CA requirement.'
      }}

- name: Fail when RHSM CA is missing and TLS validation is required
  when:
    - foreman_validate_certs | bool
    - not __rhsm_uep_ca.stat.exists
  ansible.builtin.fail:
    msg: >-
      Missing {{ rhsm_uep_ca_path }}. theforeman.foreman.redhat_manifest hardcodes
      that path for portal TLS. Re-run with --become so the role can install the
      public CA from {{ rhsm_uep_ca_url }}, or set foreman_validate_certs=false
      (not recommended).
