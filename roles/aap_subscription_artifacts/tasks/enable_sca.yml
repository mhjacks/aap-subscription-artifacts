---
# Enable SCA after subscriptions are on the allocation.
# Skip PUT when already enabled; 403 is common and usually means already SCA.

- name: Refresh allocation SCA status
  when: enable_simple_content_access | bool
  ansible.builtin.uri:
    url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}"
    method: GET
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
    return_content: true
  register: __allocation_sca_status
  no_log: true

- name: Enable Simple Content Access on the allocation
  when:
    - enable_simple_content_access | bool
    - (__allocation_sca_status.json.body.simpleContentAccess | default('')) != 'enabled'
  ansible.builtin.uri:
    url: "{{ rhsm_api_base }}/allocations/{{ __allocation_uuid }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ __rhsm_access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      simpleContentAccess: enabled
    status_code: [200, 204, 403]
  register: __sca_enable
  failed_when: false
  no_log: true

- name: Note Simple Content Access status
  when: enable_simple_content_access | bool
  ansible.builtin.debug:
    msg: >-
      {{
        'simpleContentAccess already enabled on ' ~ __allocation_uuid
        if (__allocation_sca_status.json.body.simpleContentAccess | default('')) == 'enabled'
        else (
          'Ensured simpleContentAccess=enabled on ' ~ __allocation_uuid
          if (__sca_enable.status | default(0)) in [200, 204]
          else (
            'Could not PUT simpleContentAccess on ' ~ __allocation_uuid
            ~ ' (HTTP ' ~ (__sca_enable.status | default('n/a'))
            ~ '); continuing if portal create already enabled SCA.'
          )
        )
      }}
