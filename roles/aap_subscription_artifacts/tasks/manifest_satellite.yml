---
- name: Assert Red Hat portal credentials for satellite_module backend
  ansible.builtin.assert:
    that:
      - rh_username is defined
      - rh_username | length > 0
      - rh_password is defined
      - rh_password | length > 0
    fail_msg: >-
      manifest_backend=satellite_module requires rh_username and rh_password.

- name: Assert AAP pool id for satellite_module backend
  ansible.builtin.assert:
    that:
      - aap_pool_id | length > 0
    fail_msg: >-
      manifest_backend=satellite_module requires aap_pool_id (pool discovery
      is only implemented for the RHSM API backend).

- name: Create or update Satellite manifest and export zip
  redhat.satellite.redhat_manifest:
    name: "{{ allocation_name }}"
    username: "{{ rh_username }}"
    password: "{{ rh_password }}"
    pool_id: "{{ aap_pool_id }}"
    quantity: "{{ aap_pool_quantity }}"
    path: "{{ __aap_artifacts_dir }}/{{ manifest_filename }}"
    content_access_mode: org_environment
  no_log: true
