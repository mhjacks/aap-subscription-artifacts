---
# Optional when {{ artifacts_dir }}/{{ offline_token_filename }} already exists
# rh_offline_token: ""

# Optional: password-grant generate attempt and/or foreman backend
# rh_username: ""
# rh_password: ""

# generate | fetch | all
aap_artifacts_action: fetch

# rhsm_api (default) | foreman (theforeman.foreman.redhat_manifest)
# satellite_module is accepted as an alias for foreman
manifest_backend: rhsm_api

artifacts_dir: "~/Documents/aap-subscription-artifacts"
offline_token_filename: rh-offline-token
manifest_filename: aap-manifest.zip
hub_token_filename: automation-hub-token

open_token_urls: true
hub_token_url: https://console.redhat.com/ansible/automation-hub/token
rhsm_token_url: https://access.redhat.com/management/api

sso_token_url: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
rhsm_api_base: https://api.access.redhat.com/management/v1

# Allocation (SCA only — no pool attach)
allocation_name: aap-local
# Optional explicit UUID (skips name matching when set)
allocation_uuid: ""
# Empty = pick latest version from /allocations/versions
allocation_version: ""
# Prefer an existing allocation for download when possible
reuse_existing_allocation: true
# Create allocation_name when it does not already exist
create_allocation_if_missing: true
# Always enable SCA on the allocation (console-compatible; no pools)
enable_simple_content_access: true

export_retries: 30
export_delay: 10

# Required by theforeman.foreman.redhat_manifest for portal TLS (hardcoded path)
rhsm_uep_ca_path: /etc/rhsm/ca/redhat-uep.pem
# Public copy of the cert from subscription-manager-rhsm-certificates (no RHEL package needed)
rhsm_uep_ca_url: https://raw.githubusercontent.com/Katello/katello/master/ca/redhat-uep.pem
# Passed to theforeman.foreman.redhat_manifest validate_certs.
# Default false: modern OpenSSL/Python reject redhat-uep.pem with
# "Basic Constraints of CA cert not marked critical". Prefer manifest_backend=rhsm_api
# for verified TLS via api.access.redhat.com (public CAs + offline token).
foreman_validate_certs: false
